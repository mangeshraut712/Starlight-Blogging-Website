name: Deploy to Vercel

on:
  push:
    branches: [main]

# Vercel GitHub integration auto-deploys on push to main.
# This workflow verifies the production build passes before deployment.

jobs:
  verify-build:
    name: Verify Production Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starlight-ng

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: starlight-ng/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build:prod

      - name: Type check
        run: npx tsc -p tsconfig.app.json --noEmit
