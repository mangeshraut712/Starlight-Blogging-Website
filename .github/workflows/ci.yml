name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starlight-ng

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: starlight-ng/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build:prod

      - name: Type check
        run: npx tsc -p tsconfig.app.json --noEmit

  backend:
    name: Backend Lint & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starlight-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt pytest

      - name: Validate Flask app imports
        run: .venv/bin/python -c "from app import app; print('Flask app loaded successfully')"

      - name: Run backend tests
        run: .venv/bin/pytest tests/ -q

      - name: Check syntax
        run: .venv/bin/python -m py_compile app.py models.py
