<div class="bookmarks-page">
  <div class="container">
    <h1><i class="bi bi-bookmark"></i> Reading List</h1>
    <p class="subtitle">Stories you've saved for later</p>

    <div *ngIf="isLoading" class="loading"><div class="spinner-ring"></div></div>

    <div *ngIf="!isLoading && posts.length === 0" class="empty">
      <i class="bi bi-bookmark"></i>
      <h3>No saved stories yet</h3>
      <p>Bookmark posts while reading to build your reading list.</p>
      <a routerLink="/explore" class="btn-explore">Explore Stories</a>
    </div>

    <div class="posts-grid" *ngIf="!isLoading && posts.length">
      <app-post-cart *ngFor="let post of posts" [currentPost]="post"></app-post-cart>
    </div>
  </div>
</div>
