<main class="new-post-page">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card new-post-card">
          <div class="card-header">
            <h2 class="card-title mb-0">
              <i class="bi bi-pencil me-2"></i>
              Edit Post
            </h2>
            <p class="text-muted mb-0">Update your story</p>
          </div>

          <div class="card-body" *ngIf="!isLoading; else loadingTpl">
            <form (ngSubmit)="savePost()" #editForm="ngForm" novalidate>
              <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                {{ errorMessage }}
              </div>

              <div class="mb-4">
                <label for="edit-title" class="form-label">
                  <i class="bi bi-type me-1"></i>Post Title
                </label>
                <input
                  id="edit-title"
                  type="text"
                  [(ngModel)]="post.title"
                  name="title"
                  class="form-control"
                  required
                  minlength="5"
                  maxlength="200"
                >
              </div>

              <div class="mb-4">
                <label class="form-label">
                  <i class="bi bi-tags me-1"></i>Community
                </label>
                <input type="text" class="form-control" [value]="post.label" disabled>
                <small class="text-muted">Community cannot be changed after publishing</small>
              </div>

              <div class="mb-4">
                <label class="form-label">
                  <i class="bi bi-file-text me-1"></i>Content
                </label>
                <div class="editor-container">
                  <editor
                    outputFormat="html"
                    [(ngModel)]="post.content"
                    name="content"
                    [init]="editorConfig"
                    required
                  ></editor>
                </div>
              </div>

              <div class="d-flex gap-3 justify-content-end">
                <button class="btn btn-outline-secondary btn-lg" type="button" (click)="cancelEdit()">
                  <i class="bi bi-x-circle me-2"></i>Cancel
                </button>
                <button class="btn btn-primary btn-lg" type="submit" [disabled]="editForm.invalid || isSaving">
                  <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2"></span>
                  <i *ngIf="!isSaving" class="bi bi-check-circle me-2"></i>
                  {{ isSaving ? 'Saving...' : 'Save Changes' }}
                </button>
              </div>
            </form>
          </div>

          <ng-template #loadingTpl>
            <div class="card-body text-center py-5">
              <div class="spinner-border text-primary" role="status"></div>
              <p class="mt-3 text-muted">Loading post...</p>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</main>
