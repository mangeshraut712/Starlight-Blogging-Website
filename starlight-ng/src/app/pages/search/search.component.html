<div class="search-page">
  <div class="container">
    <div class="search-header">
      <h1><i class="bi bi-search"></i> Search Stories</h1>
      <p>Find posts by title, content, author, or community</p>
    </div>

    <form class="search-form" (ngSubmit)="search()">
      <div class="search-input-group">
        <i class="bi bi-search search-icon"></i>
        <input
          type="search"
          class="search-input"
          [(ngModel)]="query"
          name="query"
          placeholder="Search posts, authors, topics..."
          autocomplete="off"
        />
      </div>

      <select class="search-filter" [(ngModel)]="labelFilter" name="labelFilter">
        <option value="">All Communities</option>
        <option *ngFor="let community of communityList" [value]="community">
          {{ community }}
        </option>
      </select>

      <div class="search-actions">
        <button type="submit" class="btn-search" [disabled]="isLoading">
          <i class="bi bi-search"></i> Search
        </button>
        <button type="button" class="btn-clear" *ngIf="hasSearched" (click)="clearSearch()">
          Clear
        </button>
      </div>
    </form>

    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner-ring"></div>
      <p>Searching the cosmos...</p>
    </div>

    <div *ngIf="!isLoading && hasSearched" class="search-results">
      <p class="results-count">
        Found <strong>{{ resultCount }}</strong> result{{ resultCount !== 1 ? 's' : '' }}
        <span *ngIf="query"> for "{{ query }}"</span>
        <span *ngIf="labelFilter"> in {{ labelFilter }}</span>
      </p>

      <div *ngIf="results.length === 0" class="empty-results">
        <i class="bi bi-emoji-frown"></i>
        <h3>No posts found</h3>
        <p>Try different keywords or browse <a routerLink="/communities">communities</a></p>
      </div>

      <div class="posts-grid" *ngIf="results.length > 0">
        <app-post-cart
          *ngFor="let post of results; trackBy: trackByPost"
          [currentPost]="post"
          class="post-card-wrapper">
        </app-post-cart>
      </div>
    </div>
  </div>
</div>
